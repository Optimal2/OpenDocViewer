name: Release

# ---------------------------------------------------------------------------
# Official OpenDocViewer release — AUTO-triggered by pushing a vX.Y.Z tag.
#
# The SINGLE human approval gate is UPSTREAM, in `release.ps1 -Publish`: an
# official release happens only when a maintainer runs `release.ps1 -Publish`,
# which validates, creates the `npm version` commit + tag, and pushes them.
# This workflow then builds and publishes the GitHub release automatically for
# the pushed tag. `release.ps1` does everything; there is no second approval.
#
# DO NOT change this trigger to `workflow_dispatch`-only or add a second
# `approve_release` input. That was introduced by an UNINTENDED AI change on
# 2026-06-28 (commit 964fa3f, "feat(release): add explicit approval gate")
# which broke the intended "release.ps1 does everything" flow and forced a
# manual dispatch. It was reverted on 2026-07-24. Keep the approval where it
# belongs — running `release.ps1 -Publish`. See docs-src/CODEX_DEVELOPMENT.md
# and AGENTS.md ("Release workflow — do not change the trigger").
# ---------------------------------------------------------------------------

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Validate tag format
        run: |
          tag='${{ github.ref_name }}'
          if [[ ! "$tag" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Tag '$tag' does not match the required vX.Y.Z pattern." >&2
            exit 1
          fi

      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ github.ref_name }}

      - name: Check out AgentDocMap
        uses: actions/checkout@v6
        with:
          repository: Optimal2/AgentDocMap
          path: _tools/AgentDocMap

      - name: Use Node
        uses: actions/setup-node@v6
        with:
          node-version: '22.18.0'
          cache: 'npm'
          cache-dependency-path: package-lock.json
          registry-url: 'https://registry.npmjs.org'

      - name: Validate lockfile registry URLs
        shell: bash
        run: |
          set -euo pipefail
          if grep -nE 'packages\.applied-caas-gateway1\.internal|artifactory' package-lock.json; then
            echo 'package-lock.json contains non-public registry URLs.' >&2
            echo 'Regenerate or normalize the lockfile before creating a release.' >&2
            exit 1
          fi

      - name: Install deps (clean)
        timeout-minutes: 20
        env:
          NPM_CONFIG_REGISTRY: https://registry.npmjs.org/
          NPM_CONFIG_FETCH_RETRIES: '2'
          NPM_CONFIG_FETCH_RETRY_MINTIMEOUT: '5000'
          NPM_CONFIG_FETCH_RETRY_MAXTIMEOUT: '30000'
          NPM_CONFIG_FETCH_TIMEOUT: '30000'
        shell: bash
        run: |
          set -euo pipefail
          echo "Node: $(node --version)"
          echo "npm:  $(npm --version)"
          for attempt in 1 2; do
            echo "npm ci attempt ${attempt}/2"
            if timeout 8m npm ci --no-audit --fund=false --verbose; then
              exit 0
            fi
            exit_code=$?
            echo "npm ci attempt ${attempt} failed with exit code ${exit_code}" >&2
            rm -rf node_modules
            npm cache clean --force || true
            if [ "$attempt" -lt 2 ]; then
              echo 'Retrying after 15 seconds...' >&2
              sleep 15
            else
              exit "$exit_code"
            fi
          done

      - name: Install AgentDocMap deps
        working-directory: _tools/AgentDocMap
        run: npm ci --no-audit --fund=false

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - name: Build docs
        run: npm run doc

      - name: Build agent docs
        run: npm run doc:agent -- --agentdocmap-root _tools/AgentDocMap

      - name: Package dist
        run: zip -r "OpenDocViewer-dist-${{ github.ref_name }}.zip" dist/

      - name: Package docs
        run: |
          if [ -d docs ]; then
            zip -r "OpenDocViewer-docs-${{ github.ref_name }}.zip" docs/
          else
            echo "docs/ folder not found; skipping docs zip."
          fi

      - name: Package agent docs
        run: |
          if [ -d docs-agent ]; then
            zip -r "OpenDocViewer-agent-docs-${{ github.ref_name }}.zip" docs-agent/
          else
            echo "docs-agent/ folder not found; skipping agent docs zip."
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: OpenDocViewer ${{ github.ref_name }}
          body_path: release-notes/${{ github.ref_name }}.md
          draft: false
          prerelease: false
          files: |
            OpenDocViewer-dist-${{ github.ref_name }}.zip
            OpenDocViewer-docs-${{ github.ref_name }}.zip
            OpenDocViewer-agent-docs-${{ github.ref_name }}.zip
